name: QuickBite
description: 'A new Flutter project.'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  bloc: ^9.2.1
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_launcher_icons: ^0.14.4
  flutter_svg: ^2.2.4
  gap: ^3.0.1
  google_nav_bar: ^5.0.7
  image_picker: ^1.2.2
  salomon_bottom_bar: ^3.3.2
  shared_preferences: ^2.5.5
  shimmer: ^3.0.0
  skeletonizer: ^2.1.3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: 'launcher_icon'
  ios: true
  image_path: 'assets/logo/logo.png'
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/splash/
    - assets/
